---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Organisation-wide GitHub Actions security audit using zizmor.
#
# This workflow lives in lfreleng-actions/.github and runs across the
# organisation as a "required workflow" via an organisation ruleset
# (Settings -> Rules -> Rulesets at the org level), so it executes on
# every selected repository without a per-repository file. It also
# audits this repository on demand (workflow_dispatch) and on its
# own pull requests.
#
# The audit logic lives in the lfreleng-actions/zizmor-scan-action
# composite action, pinned by commit SHA below. The action reads its
# zizmor version pin from its own bundled pyproject.toml, so this
# workflow embeds no version string; Dependabot's github-actions
# ecosystem keeps the pinned action SHA current here.
#
# Mode: SARIF. zizmor itself exits 0 in SARIF mode (exit codes 11+ are
# suppressed for SARIF consumers), so a dedicated gate step evaluates the
# report and fails the run when it holds any finding at low severity or
# higher. Informational findings do not block: the audit's 'low'
# severity floor keeps them out of the SARIF entirely, so everything
# that reaches the gate is a genuine low-or-higher finding.
#
# This workflow does NOT publish to code scanning. The scheduled
# zizmor-sarif-publish.yaml workflow is the single source of
# default-branch code-scanning SARIF for every repository. Publishing
# from here as well would create a second, competing zizmor analysis
# lineage that GitHub cannot reconcile, leaving stale alerts open.
#
# See README.md ("Organisation-wide zizmor audit") for org-admin setup.

name: 'Zizmor Scan 🌈'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  audit:
    name: 'Audit Workflows'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository under audit'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Run zizmor audit'
        id: 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/zizmor-scan-action@5fa3f036566614a35970aa50d984905df82333c9  # v0.4.0
        with:
          # Broad coverage with a sensible floor: the auditor persona
          # surfaces the widest set of audits and a low severity floor
          # reports findings down to the low tier (informational and
          # unknown stay out to limit noise). Set explicitly so the breadth
          # does not depend on the pinned action's defaults.
          #
          # Keep these settings identical to the scheduled publisher
          # (zizmor-sarif-publish.yaml) so the default-branch code
          # scanning posture and this gate always agree. The 'low' floor
          # also underpins the gate below and downstream SARIF decoding
          # (e.g. the github-security-report tool): zizmor emits Low AND
          # Informational findings at SARIF level note, so only the
          # floor guarantees that a note in the report is a genuine Low
          # finding. Do not lower the floor to 'informational' without
          # reworking the gate and the downstream severity mapping.
          persona: 'auditor'
          min-severity: 'low'

      - name: 'Fail on findings (low severity or higher)'
        shell: 'bash'
        env:
          ZIZMOR_SARIF: ${{ steps.audit.outputs['sarif-file'] }}
        run: |
          set -euo pipefail
          # zizmor maps severities onto SARIF levels: error=High,
          # warning=Medium, note=Low or Info, none=Info (not currently
          # emitted). The audit above runs with a 'low' severity floor,
          # so informational findings never reach the SARIF and every
          # note here is a genuine Low finding; fail the run on any
          # note-or-higher result.
          if [ ! -f "${ZIZMOR_SARIF}" ]; then
            echo "::error::zizmor SARIF report not found: ${ZIZMOR_SARIF}"
            exit 1
          fi
          # The Python lines below sit at the block scalar base
          # indentation: YAML strips it, so Python receives module-level
          # code at column 0. Do not re-indent them.
          n="$(python3 -c '
          import json, os
          BLOCK = {"error", "warning", "note"}
          path = os.environ["ZIZMOR_SARIF"]
          with open(path, encoding="utf-8") as fh:
              data = json.load(fh)
          count = 0
          for run in data.get("runs", []):
              drv = run.get("tool", {}).get("driver", {})
              cfg = {}
              for rule in drv.get("rules", []):
                  dc = rule.get("defaultConfiguration", {})
                  cfg[rule.get("id", "")] = dc.get("level", "warning")
              for res in run.get("results", []):
                  lvl = res.get("level")
                  if not lvl:
                      lvl = cfg.get(res.get("ruleId", ""), "warning")
                  if lvl in BLOCK:
                      count += 1
          print(count)
          ')"
          echo "zizmor reported ${n} finding(s) at low severity or higher"
          if [ "${n}" -gt 0 ]; then
            echo "::error::zizmor: ${n} finding(s) at low severity or higher"
            exit 1
          fi
          echo 'No low-or-higher findings; passing.'
