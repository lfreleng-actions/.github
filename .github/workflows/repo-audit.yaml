---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

name: 'Repository Audit'

# yamllint disable-line rule:truthy
on:
  schedule:
    # Run every Monday at 10:00 UTC
    - cron: '0 10 * * 1'
  # Allow manual triggering for testing
  workflow_dispatch: {}

permissions: {}

jobs:
  repo-audit:
    name: 'Check for Undocumented Repositories'
    permissions:
      contents: read
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 'Fetch organisation repositories'
        id: 'fetch-repos'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # Fetch all repositories in the organisation
          echo "Fetching repository list for lfreleng-actions..."

          REPOS=$(gh api \
            --paginate \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/orgs/lfreleng-actions/repos" \
            --jq '.[].name' | sort)

          echo "Total repositories found: $(echo "$REPOS" | wc -l)"
          {
            echo 'repos<<REPOS_EOF'
            echo "$REPOS"
            echo 'REPOS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 'Compare against profile README'
        id: 'compare'
        shell: bash
        run: |
          # Compare org repos against documented repos in profile README

          # Load excluded repos from JSON
          EXCLUDED=$(jq -r '.excluded[]' excluded-repos.json)
          echo "Excluded repositories:"
          while IFS= read -r E; do
            [ -z "$E" ] && continue
            echo "  - ${E}"
          done <<< "$EXCLUDED"

          # Extract documented repo names from profile README links
          # Matches reference-style link definitions: [repo-name]: URL
          DOCUMENTED=$(grep -oP \
            '^\[([^\]]+)\]:\s+https://github\.com/lfreleng-actions/\K[^\s]+' \
            profile/README.md | sort -u)

          echo ""
          echo "Documented repositories: $(echo "$DOCUMENTED" | wc -l)"

          # Get the full repo list from the previous step
          ALL_REPOS="${{ steps.fetch-repos.outputs.repos }}"

          # Find undocumented repos (not in README and not excluded)
          UNDOCUMENTED=""
          COUNT=0

          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue

            # Skip if excluded
            if echo "$EXCLUDED" | grep -qxF "$REPO"; then
              continue
            fi

            # Skip if documented
            if echo "$DOCUMENTED" | grep -qxF "$REPO"; then
              continue
            fi

            UNDOCUMENTED="${UNDOCUMENTED}${REPO}"$'\n'
            COUNT=$((COUNT + 1))
          done <<< "$ALL_REPOS"

          # Trim trailing newline
          UNDOCUMENTED="${UNDOCUMENTED%$'\n'}"

          echo ""
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::Found ${COUNT} undocumented repositories"
            while IFS= read -r U; do
              [ -z "$U" ] && continue
              echo "  - ${U}"
            done <<< "$UNDOCUMENTED"
            NOTIFY="true"
          else
            echo "All repositories are documented or excluded"
            NOTIFY="false"
          fi

          {
            echo "notify=${NOTIFY}"
            echo "count=${COUNT}"
            echo 'undocumented<<UNDOC_EOF'
            echo "$UNDOCUMENTED"
            echo 'UNDOC_EOF'
          } >> "$GITHUB_OUTPUT"

          # Write job summary
          {
            echo '## Repository Audit Results'
            echo ""
            if [ "$COUNT" -gt 0 ]; then
              echo "### ⚠️ ${COUNT} Undocumented Repositories"
              echo ""
              echo "The following repositories exist in the"
              echo "organisation but are not listed in the"
              echo "[profile README](../profile/README.md)"
              echo "or in \`excluded-repos.json\`:"
              echo ""
              while IFS= read -r R; do
                [ -z "$R" ] && continue
                echo "- [\`${R}\`](https://github.com/lfreleng-actions/${R})"
              done <<< "$UNDOCUMENTED"
              echo ""
              echo "**Action required:** Update \`profile/README.md\`"
              echo "to document these repositories, or add them to"
              echo "\`excluded-repos.json\` if they should be excluded."
            else
              echo "### ✅ All Repositories Documented"
              echo ""
              echo "Every repository in the organisation is either"
              echo "documented in the profile README or listed in"
              echo "\`excluded-repos.json\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 'Send Slack notification (updates needed)'
        if: steps.compare.outputs.notify == 'true'
        # yamllint disable-line rule:line-length
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: 'chat.postMessage'
          token: "${{ secrets.SLACK_BOT_TOKEN }}"
          # yamllint disable rule:line-length
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "🔍 *Repository Audit: ${{ steps.compare.outputs.count }} undocumented repos found*"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🔍 lfreleng-actions Repository Audit"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*${{ steps.compare.outputs.count }} undocumented repositories* were found in the `lfreleng-actions` organisation that are not listed in the profile README or exclusion list."
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "```${{ steps.compare.outputs.undocumented }}```"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Update `profile/README.md` or `excluded-repos.json` in the <https://github.com/lfreleng-actions/.github|.github repository>."
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
          # yamllint enable rule:line-length
