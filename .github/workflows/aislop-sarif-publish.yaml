---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Organisation-wide aislop SARIF publisher.
#
# The ruleset-enforced "AI Slop Scan" workflow (aislop.yaml) runs only
# on pull_request events for the targeted repositories and scans only
# the changed files, so it never uploads whole-repository SARIF to
# their default-branch code scanning -- organisation rulesets do not
# deliver a post-merge push event to the target repositories. This
# scheduled workflow closes that gap: every day it enumerates the
# in-scope organisation repositories (the same scope as the zizmor
# publisher, via the shared repo-discovery.yaml workflow reading
# .github/scan-scope.json), runs a full aislop scan against each via
# aislop-scan-action (which pins and verifies the aislop CLI), and
# publishes the SARIF to that repository's code scanning via the REST
# API. A final aggregation job renders a ranked score table across the
# organisation so the worst offenders are easy to spot.
#
# Analysis lineage: code scanning groups analyses into sets keyed by
# (ref, tool, category, analysis key) and an alert only closes when the
# most recent analysis of EVERY set that reported it comes back clean.
# A set that stops receiving uploads therefore pins its alerts open
# forever. To keep the lineage stable and explicit, the publish step
# stamps the SARIF run's automationDetails.id ('aislop/', yielding
# category 'aislop') before upload -- the REST API derives the
# analysis category from that field. Do not change or remove the
# stamp without migrating: publish under the new category first, then
# delete the superseded analysis sets in every repository.
#
# Requires a PAT with cross-repo code-scanning write access, read
# from the AISLOP_SARIF_PAT secret; a workflow_dispatch 'token' input
# can override it for ad-hoc runs (note: dispatch inputs are stored
# and shown in the run parameters, so prefer the secret for routine
# use). A classic PAT needs the scopes: repo,
# read:org, security_events (security_events grants the code-scanning
# write used by the SARIF upload).
#
# The target organisation defaults to the org this workflow runs in
# (github.repository_owner); a workflow_dispatch 'org' input scans a
# different organisation instead. See README.

name: 'AI Slop SARIF Publish 🧹'

# yamllint disable-line rule:truthy
on:
  schedule:
    # Daily at 07:00 UTC (offset from the zizmor publisher at 06:00)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      org:
        # yamllint disable-line rule:line-length
        description: 'Organisation to scan (name only); blank uses the org running this workflow'
        required: false
        default: ''
      repo:
        # yamllint disable-line rule:line-length
        description: 'Scan only this repository (name only) if in scope; blank scans all'
        required: false
        default: ''
      token:
        # yamllint disable-line rule:line-length
        description: 'PAT for cross-repo SARIF upload; blank falls back to the AISLOP_SARIF_PAT secret'
        required: false
        default: ''

permissions: {}

concurrency:
  group: 'aislop-sarif-publish'
  cancel-in-progress: false

jobs:
  discover:
    name: 'Discover repositories'
    permissions:
      contents: read
    uses: './.github/workflows/repo-discovery.yaml'
    with:
      org: '${{ inputs.org || github.repository_owner }}'
      only-repo: '${{ inputs.repo }}'
      extra-include: '${{ vars.AISLOP_SCAN_INCLUDE }}'
      extra-exclude: '${{ vars.AISLOP_SCAN_EXCLUDE }}'
    secrets:
      token: '${{ inputs.token || secrets.AISLOP_SARIF_PAT }}'

  publish:
    name: 'Publish SARIF (${{ matrix.repo }})'
    needs: 'discover'
    if: needs.discover.outputs.count != '0'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    # Run this job in a dedicated environment so its execution and any
    # environment-scoped secrets can be gated by environment protection
    # rules (satisfies zizmor's secrets-outside-env).
    environment: 'production'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      # Load the egress allow-list out-of-band from lfreleng-actions/.github
      # and publish it as $CONNECTION_ALLOW_LIST for the harden-runner step.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository under audit'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: '${{ needs.discover.outputs.org }}/${{ matrix.repo }}'
          ref: '${{ matrix.default_branch }}'
          persist-credentials: false
          token: '${{ inputs.token || secrets.AISLOP_SARIF_PAT }}'

      - name: 'Resolve audited commit'
        id: 'head'
        shell: bash
        run: |
          # Resolve audited commit
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 'Run aislop scan (full repository)'
        id: 'scan'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/aislop-scan-action@f990c967bc1cbbd3348cdf4ed450b4523657f123  # v0.2.0
        with:
          scan-mode: 'full'
          # This workflow publishes results, it does not gate: the
          # action reports findings via its exit-code output without
          # failing the job, and no annotations should land on the
          # .github repository running this matrix.
          annotate: 'false'
          # Label the step summary with the repository under audit
          # rather than the .github repository running this workflow.
          # yamllint disable-line rule:line-length
          summary-repository: '${{ needs.discover.outputs.org }}/${{ matrix.repo }}'
          summary-sha: '${{ steps.head.outputs.sha }}'

      - name: 'Write score metrics for aggregation'
        shell: bash
        env:
          REPO: '${{ matrix.repo }}'
          REPORT_FILE: '${{ steps.scan.outputs.report-file }}'
        run: |
          # Write score metrics for aggregation
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/aislop-metrics"
          # Prefix the filename so a repository whose name starts with
          # a dot (e.g. .github) never produces a hidden file:
          # actions/upload-artifact excludes hidden files by default
          # and the aggregation job's *.json glob skips dotfiles, so
          # an unprefixed metrics file silently drops the repository
          # from the organisation score table.
          jq -c --arg repo "${REPO}" \
            '{repo: $repo, score: .score, label: .label,
              scoreable: .scoreable, errors: .summary.errors,
              warnings: .summary.warnings, fixable: .summary.fixable,
              files: .summary.files}' \
            "${REPORT_FILE}" \
            > "${RUNNER_TEMP}/aislop-metrics/metrics-${REPO}.json"

      - name: 'Upload score metrics artifact'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: 'aislop-metrics-${{ matrix.repo }}'
          path: '${{ runner.temp }}/aislop-metrics/'
          retention-days: 7

      - name: 'Publish SARIF to code scanning'
        shell: bash
        env:
          GH_TOKEN: '${{ inputs.token || secrets.AISLOP_SARIF_PAT }}'
          ORG: '${{ needs.discover.outputs.org }}'
          REPO: '${{ matrix.repo }}'
          DEFAULT_BRANCH: '${{ matrix.default_branch }}'
          SARIF_FILE: '${{ steps.scan.outputs.sarif-file }}'
          HEAD_SHA: '${{ steps.head.outputs.sha }}'
        run: |
          # Publish SARIF to code scanning
          set -euo pipefail
          # Upload against the default-branch HEAD so results land in the
          # repository's default-branch code-scanning alert list (not a
          # PR-scoped analysis). The SARIF is gzip + base64 per the API.
          # The payload goes through a temp file and jq --rawfile so a large
          # SARIF never lands on the jq command line (ARG_MAX).
          payload_file="$(mktemp)"
          stamped_file="$(mktemp)"
          trap 'rm -f "${payload_file}" "${stamped_file}"' EXIT
          # Stamp a stable analysis category (the run's
          # automationDetails.id) so every upload lands in one explicit
          # lineage, mirroring the zizmor publisher. Set only the id so
          # any other automationDetails fields a future aislop emits
          # survive.
          # The trailing slash matters: GitHub parses the id as
          # category/run-id, and an id with no slash is ALL run-id with
          # an empty category (see "SARIF support for code scanning",
          # runAutomationDetails). "aislop/" yields category "aislop".
          jq '.runs[].automationDetails.id = "aislop/"' \
            "${SARIF_FILE}" > "${stamped_file}"
          # Guard against the stamp silently becoming a no-op (for
          # example an unexpected SARIF shape with no runs array): a
          # categoryless upload would scatter results across implicit
          # lineages.
          if ! jq -e '(.runs | type == "array" and length > 0)
                      and all(.runs[]; .automationDetails.id == "aislop/")' \
               "${stamped_file}" > /dev/null; then
            echo "::error::SARIF category stamp failed for ${REPO}" >&2
            exit 1
          fi
          gzip -c "${stamped_file}" | base64 -w0 > "${payload_file}"
          body="$(jq -n --arg sha "${HEAD_SHA}" \
            --arg ref "refs/heads/${DEFAULT_BRANCH}" \
            --rawfile sarif "${payload_file}" \
            '{commit_sha: $sha, ref: $ref, sarif: $sarif}')"
          resp=''
          for attempt in 1 2 3; do
            if resp="$(printf '%s' "${body}" | gh api --method POST \
                 -H 'Accept: application/vnd.github+json' \
                 "/repos/${ORG}/${REPO}/code-scanning/sarifs" --input -)"; then
              break
            fi
            resp=''
            echo "::warning::SARIF upload attempt ${attempt} failed for ${REPO}"
            sleep 5
          done
          if [ -z "${resp}" ]; then
            echo "::error::failed to publish SARIF for ${REPO} (3 tries)" >&2
            exit 1
          fi
          sarif_id="$(printf '%s' "${resp}" | jq -r '.id // empty')"
          if [ -z "${sarif_id}" ]; then
            echo "Unexpected upload response: ${resp}" >&2
            echo "::error::no SARIF id in upload response for ${REPO}" >&2
            exit 1
          fi
          echo "Published aislop SARIF for ${ORG}/${REPO} @ ${HEAD_SHA}"
          # Wait for code scanning to finish processing the upload so
          # the run only succeeds once alert state is committed and
          # silent SARIF rejections surface here as failures instead
          # of vanishing.
          for _ in $(seq 1 30); do
            # A failed status read logs its error (visible in the job
            # log for diagnosis) and retries as pending.
            status="$(gh api \
              "/repos/${ORG}/${REPO}/code-scanning/sarifs/${sarif_id}" \
              --jq '.processing_status')" || status='pending'
            case "${status}" in
              complete)
                echo "Code scanning processed the SARIF for ${REPO}"
                exit 0
                ;;
              failed)
                gh api \
                  "/repos/${ORG}/${REPO}/code-scanning/sarifs/${sarif_id}" \
                  --jq '.errors // []' || true
                echo "::error::code scanning rejected the SARIF for ${REPO}" >&2
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "::error::SARIF processing timed out for ${REPO}" >&2
          exit 1

  aggregate:
    name: 'Aggregate organisation scores'
    needs:
      - 'discover'
      - 'publish'
    # Render the ranked table even when individual repositories failed
    # to publish; partial data still shows where to focus attention.
    if: always() && needs.discover.outputs.count != '0'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions: {}
    steps:
      # Load the egress allow-list out-of-band from lfreleng-actions/.github
      # and publish it as $CONNECTION_ALLOW_LIST for the harden-runner step.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Download score metrics artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'aislop-metrics-*'
          path: 'aislop-metrics'
          merge-multiple: true

      - name: 'Render organisation score table'
        shell: bash
        env:
          ORG: '${{ needs.discover.outputs.org }}'
          COUNT: '${{ needs.discover.outputs.count }}'
        run: |
          # Render organisation score table
          set -euo pipefail
          shopt -s nullglob
          files=(aislop-metrics/*.json)
          {
            echo "# 🧹 AI Slop Scores: ${ORG}"
            echo
            echo "${#files[@]} of ${COUNT} in-scope repositories" \
              'reported metrics.'
            echo
            if [ "${#files[@]}" -gt 0 ]; then
              echo '| Repository | Score | Label | Errors' \
                '| Warnings | Fixable | Files |'
              echo '| --- | ---: | --- | ---: | ---: | ---: | ---: |'
              # Rank worst-first; unscoreable repositories sort last.
              jq -r -s 'sort_by(.score // 999)[]
                | "| \(.repo) | \(.score // "-") | \(.label // "-")"
                  + " | \(.errors) | \(.warnings) | \(.fixable)"
                  + " | \(.files) |"' "${files[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: 'Notify Slack on failure'
    needs:
      - 'discover'
      - 'publish'
      - 'aggregate'
    # Alert #releng-scm when the scheduled organisation scan breaks so a
    # silent daily failure does not go unnoticed. Restricted to the
    # scheduled trigger (manual dispatch runs are watched interactively)
    # and fires only when a needed job failed or was cancelled. always()
    # is required so this job still evaluates after an upstream failure.
    if: >-
      ${{ always()
      && github.event_name == 'schedule'
      && (contains(needs.*.result, 'failure')
      || contains(needs.*.result, 'cancelled')) }}
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    # The Slack bot token is an environment-scoped secret; running here
    # also satisfies zizmor's secrets-outside-env audit.
    environment: 'production'
    permissions: {}
    steps:
      # Load the egress allow-list out-of-band from lfreleng-actions/.github
      # and publish it as $CONNECTION_ALLOW_LIST for the harden-runner step.
      # The pinned allow-list permits slack.com, so the notification below
      # reaches Slack under the block egress policy.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: '@8f4f0cf83e6a015957e83261ed379fd811fc060e'  # v0.5.1

      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Notify Slack of scan failure'
        # yamllint disable-line rule:line-length
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: 'chat.postMessage'
          token: "${{ secrets.SLACK_BOT_TOKEN }}"
          # yamllint disable rule:line-length
          payload: |
            channel: "${{ vars.SLACK_CHANNEL_ID }}"
            text: "🧹 *AI Slop SARIF Publish failed* in ${{ github.repository }}"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🧹 AI Slop SARIF Publish failed"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "The scheduled organisation-wide *AI slop* scan failed. Default-branch code-scanning alerts may be stale until it re-runs successfully."
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
          # yamllint enable rule:line-length
