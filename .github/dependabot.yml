# Dependabot configuration for the lfreleng-actions/.github repository.

version: 2
updates:
  # Workflows in this repository (action versions). This also keeps the
  # pinned lfreleng-actions/zizmor-scan-action ref in
  # .github/workflows/zizmor.yaml current; the zizmor version itself is
  # pinned inside that action and bumped in its own repository.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'CI(actions)'
    # Wait a few days before opening a bump PR so we don't churn on
    # a release that gets retracted or superseded shortly after it
    # ships. Also satisfies zizmor's `dependabot-cooldown` audit.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
